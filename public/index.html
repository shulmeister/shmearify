<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shmearify</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #121212;
    color: #fff;
    overflow: hidden;
  }
  #app {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 1fr 90px;
    height: 100vh;
  }
  .sidebar {
    background: #000;
    grid-row: 1 / 2;
    display: flex;
    flex-direction: column;
    padding: 16px;
    overflow: hidden;
  }
  .sidebar h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    color: #fff;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .brand-logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    flex: 0 0 auto;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  }
  .brand h1 { margin-bottom: 0; }
  .hero {
    height: 200px;
    border-radius: 10px;
    margin-bottom: 24px;
    flex: 0 0 auto;
    background-image: linear-gradient(180deg, rgba(18,18,18,0.10) 0%, rgba(18,18,18,0.45) 55%, #121212 100%), url("header.jpg");
    background-size: cover;
    background-position: center 38%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 18px 24px;
  }
  .hero h2 {
    margin: 0;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
  }
  .hero-tag {
    margin: 4px 0 0;
    font-size: 14px;
    color: #e0e0e0;
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
  }
  .search-box {
    background: #242424;
    border: none;
    border-radius: 4px;
    color: #fff;
    padding: 8px 12px;
    font-size: 13px;
    width: 100%;
    margin-bottom: 12px;
    outline: none;
  }
  .search-box::placeholder { color: #b3b3b3; }
  .artist-list {
    flex: 1;
    overflow-y: auto;
    list-style: none;
  }
  .artist-list li {
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    color: #b3b3b3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .artist-list li:hover { color: #fff; background: #1a1a1a; }
  .artist-list li.active { color: #1db954; font-weight: 600; }
  .main {
    grid-row: 1 / 2;
    overflow-y: auto;
    padding: 24px 32px;
    background: #121212;
  }
  .main-header {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #fff;
  }
  .track-table { width: 100%; border-collapse: collapse; }
  .track-table th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    color: #b3b3b3;
    padding: 8px 12px;
    border-bottom: 1px solid #282828;
    position: sticky;
    top: 0;
    background: #121212;
  }
  .track-table td {
    padding: 10px 12px;
    font-size: 13px;
    color: #b3b3b3;
    border-bottom: 1px solid #181818;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-table tr { cursor: pointer; }
  .track-table tr:hover td { background: #1a1a1a; color: #fff; }
  .track-table tr.playing td { color: #1db954; }
  .track-table td:first-child, .track-table th:first-child { width: 40px; text-align: center; }
  .track-table td:last-child, .track-table th:last-child { width: 50px; text-align: right; }
  .player {
    grid-column: 1 / -1;
    background: #181818;
    border-top: 1px solid #282828;
    display: grid;
    grid-template-columns: 1fr 1.5fr 1fr;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
  }
  .player-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .art-wrap {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    background: #282828;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .art-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .art-placeholder { width: 24px; height: 24px; }
  .player-info { min-width: 0; }
  .player-info .title { font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-info .artist { font-size: 11px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .controls { display: flex; align-items: center; gap: 16px; }
  .btn { background: none; border: none; color: #b3b3b3; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; }
  .btn:hover { color: #fff; }
  .btn-play { width: 32px; height: 32px; background: #fff; border-radius: 50%; color: #000; }
  .btn-play:hover { transform: scale(1.05); }
  .progress-area { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 500px; }
  .time { font-size: 10px; color: #b3b3b3; width: 30px; text-align: center; font-variant-numeric: tabular-nums; }
  .progress-wrap { flex: 1; position: relative; height: 16px; display: flex; align-items: center; cursor: pointer; }
  .progress-track { width: 100%; height: 4px; background: #535353; border-radius: 2px; position: relative; }
  .progress-fill { height: 100%; background: #1db954; border-radius: 2px; width: 0%; }
  .progress-wrap:hover .progress-fill { background: #1ed760; }
  .player-right { display: flex; align-items: center; justify-content: flex-end; gap: 12px; }
  .quality-select {
    background: #282828;
    color: #fff;
    border: 1px solid #3e3e3e;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .quality-select option { background: #282828; color: #fff; }
  .quality-label {
    font-size: 10px;
    color: #b3b3b3;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .quality-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .notice { font-size: 11px; color: #e22134; }
  .center-panel {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 12px; color: #b3b3b3; text-align: center; padding: 24px;
  }
  .progress-bar-outer {
    width: 240px; height: 6px; background: #282828; border-radius: 3px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%; background: #1db954; border-radius: 3px; transition: width 0.2s ease;
  }
  .indeterminate .progress-bar-inner {
    width: 40% !important; animation: indet 1.2s infinite linear;
  }
  @keyframes indet {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
  }
  .badge {
    display: inline-block; background: #1db954; color: #000; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; margin-left: 8px;
  }
  .mobile-toggle {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 10;
    background: #000; color: #fff; border: 1px solid #282828; border-radius: 4px;
    padding: 6px 10px; font-size: 13px; cursor: pointer;
  }
  .summary-line {
    font-size: 13px;
    color: #b3b3b3;
    margin-bottom: 16px;
  }
  @media (max-width: 720px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100%; z-index: 5; transform: translateX(-100%); transition: transform 0.2s; }
    .sidebar.open { transform: translateX(0); }
    .mobile-toggle { display: block; min-width: 44px; min-height: 44px; }
    .main { padding: 48px 16px 16px; }
    .hero { height: 120px; margin-bottom: 16px; }
    .hero h2 { font-size: 22px; }
    .track-table td { padding: 12px 8px; }
    .player {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      grid-template-areas: "left right" "center center";
      padding: 8px 12px;
      gap: 8px;
    }
    .player-left { grid-area: left; }
    .player-right { grid-area: right; justify-content: flex-end; }
    .player-center { grid-area: center; width: 100%; }
    .progress-area { max-width: none; }
    .art-wrap { width: 44px; height: 44px; }
    .btn { min-width: 44px; min-height: 44px; padding: 8px; }
    .btn-play { width: 44px; height: 44px; }
    .progress-wrap { min-height: 44px; }
    .quality-select { min-height: 44px; }
  }
  @media (max-width: 600px) {
    .track-table td:first-child, .track-table th:first-child { display: none; }
    .track-table td:nth-child(4), .track-table th:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<button class="mobile-toggle" id="mobileToggle" aria-label="Menu">&#9776;</button>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img class="brand-logo" src="profile.jpg" alt="Shmearify logo">
      <h1>Shmearify</h1>
    </div>
    <input class="search-box" id="searchBox" placeholder="Search…" autocomplete="off">
    <ul class="artist-list" id="artistList"></ul>
  </aside>
  <main class="main" id="main">
    <div class="hero">
      <h2>Shmearify</h2>
      <p class="hero-tag">Tommy Engelshmear's whole library, anywhere.</p>
    </div>
    <div id="trackPanel"></div>
  </main>
  <div class="player">
    <div class="player-left">
      <div class="art-wrap" id="artWrap">
        <svg class="art-placeholder" viewBox="0 0 24 24" fill="#b3b3b3"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </div>
      <div class="player-info">
        <div class="title" id="playerTitle">—</div>
        <div class="artist" id="playerArtist">—</div>
      </div>
    </div>
    <div class="player-center">
      <div class="controls">
        <button class="btn" id="btnPrev" aria-label="Previous">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h2v10H3zm3 5l8-5v10z"/></svg>
        </button>
        <button class="btn btn-play" id="btnPlay" aria-label="Play/Pause">
          <svg id="iconPlay" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l10 5-10 5z"/></svg>
          <svg id="iconPause" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M4 3h3v10H4zm5 0h3v10H9z"/></svg>
        </button>
        <button class="btn" id="btnNext" aria-label="Next">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11 3h2v10h-2zM3 3v10l8-5z"/></svg>
        </button>
      </div>
      <div class="progress-area">
        <span class="time" id="timeCurrent">0:00</span>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <span class="time" id="timeTotal">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <div class="quality-wrap">
        <span class="quality-label">Quality</span>
        <select class="quality-select" id="qualitySelect">
          <option value="original">Original</option>
          <option value="high">High</option>
          <option value="normal">Normal</option>
          <option value="low">Low (Data Saver)</option>
        </select>
      </div>
      <span class="notice" id="playerNotice"></span>
    </div>
  </div>
</div>
<audio id="audio" preload="metadata"></audio>

<script>
(function() {
  const state = {
    artists: [],          // [{ name, count }] — lightweight, from /api/artists
    albums: [],           // [{ album, count }] — shows for the selected artist
    tracks: [],           // currently displayed tracks (one show, or search hits)
    viewTotal: 0,         // true total for the current view (may exceed tracks.length, which is capped)
    selectedArtist: null,
    selectedAlbum: null,  // when set with selectedArtist, we're viewing one show's songs
    search: "",
    queue: [],
    queueIndex: -1,
    currentTrack: null,
    isPlaying: false,
    status: { scanning: false, scanned: 0, total: null, mounted: true, ready: false, trackCount: 0 },
    streamBaseOffset: 0,
    quality: "original",
  };

  const els = {
    artistList: document.getElementById("artistList"),
    main: document.getElementById("main"),
    trackPanel: document.getElementById("trackPanel"),
    searchBox: document.getElementById("searchBox"),
    audio: document.getElementById("audio"),
    btnPlay: document.getElementById("btnPlay"),
    btnPrev: document.getElementById("btnPrev"),
    btnNext: document.getElementById("btnNext"),
    iconPlay: document.getElementById("iconPlay"),
    iconPause: document.getElementById("iconPause"),
    playerTitle: document.getElementById("playerTitle"),
    playerArtist: document.getElementById("playerArtist"),
    artWrap: document.getElementById("artWrap"),
    progressWrap: document.getElementById("progressWrap"),
    progressFill: document.getElementById("progressFill"),
    timeCurrent: document.getElementById("timeCurrent"),
    timeTotal: document.getElementById("timeTotal"),
    playerNotice: document.getElementById("playerNotice"),
    mobileToggle: document.getElementById("mobileToggle"),
    sidebar: document.getElementById("sidebar"),
    qualitySelect: document.getElementById("qualitySelect"),
  };

  function formatTime(s) {
    if (!s || !isFinite(s)) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function formatNumber(n) {
    return n.toLocaleString();
  }

  async function fetchJson(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status + " " + r.statusText);
    return r.json();
  }

  let artistsLoaded = false;
  let pollCount = 0;
  async function pollStatus() {
    try {
      state.status = await fetchJson("api/status");
    } catch (e) {
      // ignore
    }
    // As soon as the server has any tracks, pull the lightweight artist list once. We never fetch
    // the whole library to the client — search and per-artist tracks are served on demand.
    if (state.status.ready && !artistsLoaded) {
      artistsLoaded = true;
      await loadArtists();
    }
    renderState();
    // Phase-2 enrichment fills real durations on the server over time. Folder-based artist names
    // are fixed in phase 1, so the sidebar is stable — but refresh the *current* view every ~30s
    // while scanning so durations (and transcoded-seek) fill in without a manual reload.
    pollCount += 1;
    if (state.status.scanning && artistsLoaded && pollCount % 10 === 0) {
      refreshCurrentView();
    }
    if (!state.status.ready || state.status.scanning) {
      setTimeout(pollStatus, 3000);
    }
  }

  async function loadArtists() {
    try {
      state.artists = await fetchJson("api/artists"); // [{ name, count }]
      renderArtists();
    } catch (e) {
      // ignore
    }
  }

  // Reload whatever the user is currently looking at (an artist's tracks or a search) from the
  // server, picking up newly-enriched durations. No-op on the empty/home view.
  function refreshCurrentView() {
    if (state.search.trim()) {
      runSearch(state.search, true);
    } else if (state.selectedArtist && state.selectedAlbum) {
      loadAlbumTracks(state.selectedArtist, state.selectedAlbum, true);
    }
  }

  // Picking a band shows its SHOWS (albums), not a flat song list. For the Dead that's hundreds of
  // date/venue shows; you pick a show, then a song. (One-album artists skip straight to the songs.)
  async function loadArtistAlbums(name, silent) {
    state.selectedArtist = name;
    state.selectedAlbum = null;
    if (!silent) {
      state.search = "";
      els.searchBox.value = "";
      renderArtists();
    }
    try {
      state.albums = await fetchJson("api/albums?artist=" + encodeURIComponent(name)); // [{album,count}]
    } catch (e) {
      state.albums = [];
    }
    if (state.albums.length === 1) {
      loadAlbumTracks(name, state.albums[0].album, silent);
      return;
    }
    renderMain();
  }

  async function loadAlbumTracks(artist, album, silent) {
    state.selectedArtist = artist;
    state.selectedAlbum = album;
    try {
      state.tracks = await fetchJson(
        "api/album-tracks?artist=" + encodeURIComponent(artist) + "&album=" + encodeURIComponent(album)
      );
      state.viewTotal = state.tracks.length;
    } catch (e) {
      state.tracks = [];
      state.viewTotal = 0;
    }
    renderMain();
  }

  let searchSeq = 0;
  async function runSearch(q, silent) {
    state.search = q;
    if (!silent) {
      state.selectedArtist = null;
      state.selectedAlbum = null;
    }
    const trimmed = q.trim();
    if (!trimmed) {
      state.tracks = [];
      state.viewTotal = 0;
      renderMain();
      return;
    }
    const seq = ++searchSeq;
    try {
      const data = await fetchJson("api/search?q=" + encodeURIComponent(trimmed));
      if (seq !== searchSeq) return; // a newer search superseded this one
      state.tracks = data.tracks;
      state.viewTotal = data.total;
    } catch (e) {
      if (seq !== searchSeq) return;
      state.tracks = [];
      state.viewTotal = 0;
    }
    renderMain();
  }

  function renderState() {
    const s = state.status;
    // "ready" means the server has tracks indexed (phase-1 path scan done). Until then, show a
    // status panel. Background ID3 enrichment (s.scanning) does NOT block — the app is fully
    // usable from folder-based names the moment it's ready.
    if (!s.ready) {
      let html = '<div class="center-panel">';
      if (!s.mounted) {
        html += '<div style="font-size:14px;">Music drive not mounted — connect the drive and restart/rescan</div>';
      } else if (s.scanning) {
        html += '<div style="font-size:14px;">Building your library…';
        if (s.total) html += ' ' + s.scanned + ' of ' + s.total + ' tracks';
        html += '</div>';
        html += '<div class="progress-bar-outer' + (s.total ? '' : ' indeterminate') + '"><div class="progress-bar-inner" style="width:' + (s.total ? Math.round((s.scanned / s.total) * 100) : 0) + '%"></div></div>';
      } else {
        html += '<div style="font-size:14px;">Loading…</div>';
      }
      html += '</div>';
      els.trackPanel.innerHTML = html;
      return;
    }
    if (!els.trackPanel.innerHTML.trim()) {
      renderMain();
    }
  }

  // The sidebar box filters the band list live. Typing "gra" surfaces "Grateful Dead" right in the
  // nav — bands whose name STARTS with the query come first, then bands that merely contain it.
  // This is the fast path on mobile: a couple letters, tap the band. Filtering is local over the
  // ~4k artist names, so it's instant.
  const ARTIST_RENDER_CAP = 500;
  function filterArtists(q) {
    if (!q) return state.artists;
    const starts = [];
    const contains = [];
    for (const a of state.artists) {
      const n = a.name.toLowerCase();
      if (n.startsWith(q)) starts.push(a);
      else if (n.includes(q)) contains.push(a);
    }
    return starts.concat(contains);
  }

  function renderArtists() {
    const q = els.searchBox.value.trim().toLowerCase();
    const list = filterArtists(q);
    const frag = document.createDocumentFragment();

    if (!q) {
      const home = document.createElement("li");
      home.textContent = "Home";
      if (!state.selectedArtist) home.classList.add("active");
      home.addEventListener("click", () => {
        state.selectedArtist = null;
        state.selectedAlbum = null;
        state.search = "";
        els.searchBox.value = "";
        state.tracks = [];
        renderArtists();
        renderMain();
        closeSidebarOnMobile();
      });
      frag.appendChild(home);
    }

    const shown = list.slice(0, ARTIST_RENDER_CAP);
    for (const a of shown) {
      const li = document.createElement("li");
      li.textContent = a.name;
      li.title = a.name + " · " + a.count + (a.count === 1 ? " track" : " tracks");
      if (state.selectedArtist === a.name) li.classList.add("active");
      li.addEventListener("click", () => {
        loadArtistAlbums(a.name);
        closeSidebarOnMobile();
      });
      frag.appendChild(li);
    }

    if (list.length > shown.length) {
      const more = document.createElement("li");
      more.style.color = "#6a6a6a";
      more.style.cursor = "default";
      more.textContent = "+" + formatNumber(list.length - shown.length) +
        " more — keep typing to narrow";
      frag.appendChild(more);
    } else if (!q && state.artists.length === 0) {
      const empty = document.createElement("li");
      empty.style.color = "#6a6a6a";
      empty.style.cursor = "default";
      empty.textContent = "Loading artists…";
      frag.appendChild(empty);
    }

    els.artistList.innerHTML = "";
    els.artistList.appendChild(frag);
  }

  function setActiveArtist(activeLi) {
    for (const li of els.artistList.children) li.classList.remove("active");
    if (activeLi) activeLi.classList.add("active");
  }

  function closeSidebarOnMobile() {
    if (window.innerWidth <= 720) {
      els.sidebar.classList.remove("open");
    }
  }

  // Dispatcher: search hits → track table; artist+show → that show's songs; artist only → its
  // shows; nothing → home summary.
  function renderMain() {
    if (state.search.trim()) return renderTracks();
    if (state.selectedArtist && state.selectedAlbum) return renderTracks();
    if (state.selectedArtist) return renderAlbums();
    return renderHome();
  }

  function appendScanBadge(frag) {
    if (!state.status.scanning) return;
    const headerEl = frag.querySelector(".main-header");
    if (!headerEl) return;
    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = "Indexing…";
    headerEl.appendChild(badge);
  }

  function renderHome() {
    const frag = document.createDocumentFragment();
    const header = document.createElement("div");
    header.className = "main-header";
    header.textContent = "Home";
    frag.appendChild(header);
    const summary = document.createElement("div");
    summary.className = "summary-line";
    summary.textContent = formatNumber(state.artists.length) + " artists · " +
      formatNumber(state.status.trackCount) + " tracks — pick an artist on the left, or search.";
    frag.appendChild(summary);
    appendScanBadge(frag);
    els.trackPanel.innerHTML = "";
    els.trackPanel.appendChild(frag);
  }

  // Shows/albums for the selected artist. For the Dead these are date-prefixed shows, in order.
  function renderAlbums() {
    const frag = document.createDocumentFragment();
    const header = document.createElement("div");
    header.className = "main-header";
    header.textContent = state.selectedArtist;
    frag.appendChild(header);

    const sub = document.createElement("div");
    sub.className = "summary-line";
    sub.textContent = formatNumber(state.albums.length) +
      (state.albums.length === 1 ? " show / album — pick it." : " shows / albums — pick one.");
    frag.appendChild(sub);

    if (state.albums.length === 0) {
      const empty = document.createElement("div");
      empty.style.color = "#b3b3b3";
      empty.style.fontSize = "13px";
      empty.textContent = state.status.scanning ? "Still indexing…" : "No shows found.";
      frag.appendChild(empty);
    } else {
      const listEl = document.createElement("div");
      for (const al of state.albums) {
        const row = document.createElement("div");
        row.style.cssText = "padding:12px;border-bottom:1px solid #181818;cursor:pointer;font-size:14px;" +
          "display:flex;justify-content:space-between;gap:12px;color:#cfcfcf;";
        const name = document.createElement("span");
        name.textContent = al.album;
        name.style.cssText = "white-space:nowrap;overflow:hidden;text-overflow:ellipsis;";
        const count = document.createElement("span");
        count.textContent = al.count;
        count.style.cssText = "color:#888;flex:0 0 auto;";
        row.appendChild(name);
        row.appendChild(count);
        row.addEventListener("mouseenter", () => { row.style.background = "#1a1a1a"; row.style.color = "#fff"; });
        row.addEventListener("mouseleave", () => { row.style.background = ""; row.style.color = "#cfcfcf"; });
        row.addEventListener("click", () => loadAlbumTracks(state.selectedArtist, al.album));
        listEl.appendChild(row);
      }
      frag.appendChild(listEl);
    }

    appendScanBadge(frag);
    els.trackPanel.innerHTML = "";
    els.trackPanel.appendChild(frag);
  }

  // Track table — used for search results and for one show's songs.
  function renderTracks() {
    const tracks = state.tracks;
    const isSearch = !!state.search.trim();
    const inAlbum = !isSearch && state.selectedArtist && state.selectedAlbum;
    const frag = document.createDocumentFragment();

    if (inAlbum) {
      const back = document.createElement("div");
      back.style.cssText = "font-size:13px;color:#1db954;cursor:pointer;margin-bottom:8px;";
      back.textContent = "← " + state.selectedArtist;
      back.addEventListener("click", () => loadArtistAlbums(state.selectedArtist));
      frag.appendChild(back);
    }

    const header = document.createElement("div");
    header.className = "main-header";
    if (isSearch) header.textContent = 'Search: "' + state.search.trim() + '"';
    else if (state.selectedAlbum) header.textContent = state.selectedAlbum;
    else header.textContent = state.selectedArtist || "Library";
    frag.appendChild(header);

    if (tracks.length === 0) {
      const empty = document.createElement("div");
      empty.style.color = "#b3b3b3";
      empty.style.fontSize = "13px";
      empty.textContent = state.status.scanning ? "No matches yet — still indexing…" : "No tracks found.";
      frag.appendChild(empty);
    } else {
      const limit = 500;
      const toShow = tracks.slice(0, limit);

      const table = document.createElement("table");
      table.className = "track-table";
      const thead = document.createElement("thead");
      thead.innerHTML = '<tr><th>#</th><th>Title</th><th>Artist</th><th>Album</th><th></th></tr>';
      table.appendChild(thead);
      const tbody = document.createElement("tbody");

      toShow.forEach((t, i) => {
        const tr = document.createElement("tr");
        if (state.currentTrack && state.currentTrack.id === t.id) tr.classList.add("playing");
        const dur = t.duration ? formatTime(t.duration) : "--:--";
        // In a show, use the real track number for ordering; in search, fall back to row index.
        const num = inAlbum && t.trackNo ? t.trackNo : (i + 1);
        tr.innerHTML = '<td>' + num + '</td><td>' + esc(t.title) + '</td><td>' + esc(t.artist) + '</td><td>' + esc(t.album) + '</td><td>' + dur + '</td>';
        tr.addEventListener("click", () => playTrack(t, tracks));
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      frag.appendChild(table);

      const total = state.viewTotal || tracks.length;
      if (total > toShow.length) {
        const note = document.createElement("div");
        note.style.color = "#b3b3b3";
        note.style.fontSize = "12px";
        note.style.marginTop = "8px";
        note.textContent = "Showing first " + toShow.length + " of " + formatNumber(total) +
          (isSearch ? " matches — refine your search." : " tracks.");
        frag.appendChild(note);
      }
    }

    appendScanBadge(frag);
    els.trackPanel.innerHTML = "";
    els.trackPanel.appendChild(frag);
  }

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function getStreamUrl(id, quality, offset) {
    let url = "stream/" + id;
    const params = [];
    if (quality && quality !== "original") params.push("q=" + encodeURIComponent(quality));
    if (offset && offset > 0) params.push("t=" + encodeURIComponent(offset));
    if (params.length) url += "?" + params.join("&");
    return url;
  }

  function playTrack(track, queue) {
    state.queue = queue || [track];
    state.queueIndex = state.queue.findIndex(t => t.id === track.id);
    if (state.queueIndex < 0) state.queueIndex = 0;
    state.currentTrack = track;
    state.streamBaseOffset = 0;
    els.audio.src = getStreamUrl(track.id, state.quality, 0);
    els.audio.play().catch(() => {});
    state.isPlaying = true;
    updatePlayerUI();
    renderMain();
    closeSidebarOnMobile();
  }

  function updatePlayerUI() {
    const t = state.currentTrack;
    if (!t) {
      els.playerTitle.textContent = "—";
      els.playerArtist.textContent = "—";
      els.artWrap.innerHTML = '<svg class="art-placeholder" viewBox="0 0 24 24" fill="#b3b3b3"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>';
      return;
    }
    els.playerTitle.textContent = t.title;
    els.playerArtist.textContent = t.artist;
    els.iconPlay.style.display = state.isPlaying ? "none" : "";
    els.iconPause.style.display = state.isPlaying ? "" : "none";
    const img = document.createElement("img");
    img.src = "art/" + t.id;
    img.onerror = function() {
      els.artWrap.innerHTML = '<svg class="art-placeholder" viewBox="0 0 24 24" fill="#b3b3b3"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>';
    };
    els.artWrap.innerHTML = "";
    els.artWrap.appendChild(img);
  }

  function togglePlay() {
    if (!els.audio.src) return;
    if (state.isPlaying) els.audio.pause();
    else els.audio.play().catch(() => {});
  }

  function prevTrack() {
    if (!state.queue.length) return;
    state.queueIndex = (state.queueIndex - 1 + state.queue.length) % state.queue.length;
    playTrack(state.queue[state.queueIndex], state.queue);
  }

  function nextTrack() {
    if (!state.queue.length) return;
    state.queueIndex = (state.queueIndex + 1) % state.queue.length;
    playTrack(state.queue[state.queueIndex], state.queue);
  }

  function effectiveTime() {
    return state.streamBaseOffset + (els.audio.currentTime || 0);
  }

  function seekTo(e) {
    const rect = els.progressWrap.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const track = state.currentTrack;
    if (!track) return;

    if (state.quality === "original") {
      if (els.audio.duration && isFinite(els.audio.duration)) {
        els.audio.currentTime = ratio * els.audio.duration;
      }
    } else {
      if (!track.duration) return;
      const target = ratio * track.duration;
      els.audio.src = getStreamUrl(track.id, state.quality, target);
      state.streamBaseOffset = target;
      els.audio.play().catch(() => {});
      state.isPlaying = true;
      updatePlayerUI();
    }
  }

  function applyQuality() {
    const track = state.currentTrack;
    if (!track) return;
    const wasPlaying = state.isPlaying;
    const eff = effectiveTime();

    if (state.quality === "original") {
      els.audio.src = getStreamUrl(track.id, "original", 0);
      state.streamBaseOffset = 0;
      els.audio.addEventListener("loadedmetadata", function onMeta() {
        els.audio.removeEventListener("loadedmetadata", onMeta);
        if (eff > 0 && els.audio.duration && isFinite(els.audio.duration)) {
          els.audio.currentTime = Math.min(eff, els.audio.duration);
        }
        if (wasPlaying) els.audio.play().catch(() => {});
      });
      if (!wasPlaying) els.audio.load();
    } else {
      els.audio.src = getStreamUrl(track.id, state.quality, eff);
      state.streamBaseOffset = eff;
      if (wasPlaying) {
        els.audio.play().catch(() => {});
      } else {
        els.audio.load();
      }
    }
    updatePlayerUI();
  }

  // Events
  els.btnPlay.addEventListener("click", togglePlay);
  els.btnPrev.addEventListener("click", prevTrack);
  els.btnNext.addEventListener("click", nextTrack);
  els.progressWrap.addEventListener("click", seekTo);

  els.audio.addEventListener("play", () => { state.isPlaying = true; updatePlayerUI(); });
  els.audio.addEventListener("pause", () => { state.isPlaying = false; updatePlayerUI(); });
  els.audio.addEventListener("timeupdate", () => {
    const current = effectiveTime();
    els.timeCurrent.textContent = formatTime(current);
    const track = state.currentTrack;
    let total = 0;
    let pct = 0;
    if (state.quality === "original") {
      total = els.audio.duration || 0;
      pct = total && isFinite(total) ? (els.audio.currentTime / total) * 100 : 0;
    } else {
      total = track && track.duration ? track.duration : 0;
      pct = total && isFinite(total) ? (current / total) * 100 : 0;
    }
    els.timeTotal.textContent = total ? formatTime(total) : "--:--";
    els.progressFill.style.width = pct + "%";
  });
  els.audio.addEventListener("loadedmetadata", () => {
    const track = state.currentTrack;
    if (state.quality === "original") {
      els.timeTotal.textContent = formatTime(els.audio.duration);
    } else {
      els.timeTotal.textContent = track && track.duration ? formatTime(track.duration) : "--:--";
    }
  });
  els.audio.addEventListener("ended", nextTrack);
  els.audio.addEventListener("error", () => {
    els.playerNotice.textContent = "Playback error";
    setTimeout(() => els.playerNotice.textContent = "", 3000);
  });

  let debounceTimer;
  els.searchBox.addEventListener("input", () => {
    renderArtists(); // instant: filter the band list in the left nav (prefix-first)
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      runSearch(els.searchBox.value); // server-side track search → main panel
    }, 250);
  });

  els.mobileToggle.addEventListener("click", () => {
    els.sidebar.classList.toggle("open");
  });
  document.addEventListener("click", (e) => {
    if (window.innerWidth <= 720 && els.sidebar.classList.contains("open") && !els.sidebar.contains(e.target) && e.target !== els.mobileToggle) {
      els.sidebar.classList.remove("open");
    }
  });

  els.qualitySelect.addEventListener("change", () => {
    state.quality = els.qualitySelect.value;
    try { localStorage.setItem("shmearify-quality", state.quality); } catch (e) {}
    applyQuality();
  });

  // Init
  try {
    const saved = localStorage.getItem("shmearify-quality");
    if (saved && ["original", "high", "normal", "low"].includes(saved)) {
      state.quality = saved;
      els.qualitySelect.value = saved;
    }
  } catch (e) {}

  pollStatus();
})();
</script>
</body>
</html>
