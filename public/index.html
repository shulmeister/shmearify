<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shmearify">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Shmearify</title>
<!-- Link preview (Open Graph + Twitter) — large image card when the URL is shared via iMessage/social -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Shmearify">
<meta property="og:url" content="https://shmearify.coloradocareassist.com/">
<meta property="og:title" content="Shmearify">
<meta property="og:description" content="Tommy Engelshmear's whole library, anywhere.">
<meta property="og:image" content="https://shmearify.coloradocareassist.com/header.jpg">
<meta property="og:image:secure_url" content="https://shmearify.coloradocareassist.com/header.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="1600">
<meta property="og:image:height" content="720">
<meta property="og:image:alt" content="Shmearify">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Shmearify">
<meta name="twitter:description" content="Tommy Engelshmear's whole library, anywhere.">
<meta name="twitter:image" content="https://shmearify.coloradocareassist.com/header.jpg">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<button class="mobile-toggle" id="mobileToggle" aria-label="Menu">&#9776;</button>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img class="brand-logo" src="/profile.jpg" alt="Shmearify logo">
      <h1>Shmearify</h1>
    </div>
    <input class="search-box" id="searchBox" placeholder="Search…" autocomplete="off">
    <div class="az-scrubber" id="azScrubber"></div>
    <ul class="artist-list" id="artistList"></ul>
  </aside>
  <main class="main" id="main">
    <div class="hero">
      <h2>Shmearify</h2>
      <p class="hero-tag">Tommy Engelshmear's whole library, anywhere.</p>
    </div>
    <div id="trackPanel"></div>
  </main>
  <div class="player">
    <div class="player-left">
      <div class="art-wrap" id="artWrap">
        <svg class="art-placeholder" viewBox="0 0 24 24" fill="#b3b3b3"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </div>
      <div class="player-info">
        <div class="title-row">
          <div class="title" id="playerTitle">—</div>
          <span id="playerQuality"></span>
        </div>
        <div class="artist" id="playerArtist">—</div>
      </div>
    </div>
    <div class="player-center">
      <div class="controls">
        <button class="btn" id="btnShuffle" title="Shuffle" aria-label="Shuffle">⇄</button>
        <button class="btn" id="btnPrev" aria-label="Previous">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h2v10H3zm3 5l8-5v10z"/></svg>
        </button>
        <button class="btn btn-play" id="btnPlay" aria-label="Play/Pause">
          <svg id="iconPlay" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l10 5-10 5z"/></svg>
          <svg id="iconPause" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M4 3h3v10H4zm5 0h3v10H9z"/></svg>
        </button>
        <button class="btn" id="btnNext" aria-label="Next">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11 3h2v10h-2zM3 3v10l8-5z"/></svg>
        </button>
        <button class="btn" id="btnRepeat" title="Repeat" aria-label="Repeat">↻</button>
      </div>
      <div class="progress-area">
        <span class="time" id="timeCurrent">0:00</span>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <span class="time" id="timeTotal">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <div class="volume-wrap" title="Volume">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-1.5-3.35v6.7A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/></svg>
        <input class="volume-slider" id="volumeSlider" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
      </div>
      <div class="quality-wrap">
        <span class="quality-label">Quality</span>
        <select class="quality-select" id="qualitySelect">
          <option value="original">Original</option>
          <option value="high">High</option>
          <option value="normal">Normal</option>
          <option value="low">Low (Data Saver)</option>
        </select>
      </div>
      <span class="notice" id="playerNotice"></span>
    </div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
